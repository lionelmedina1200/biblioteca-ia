<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <h1>Biblioteca IA</h1>
            </div>
            <div class="user-menu" id="user-menu"></div>
        </div>
        <nav class="header-nav">
            <a href="/" class="nav-link">Inicio</a>
            <a href="/checkin" class="nav-link">Check-in</a>
            <a href="/dashboard" class="nav-link active">Dashboard</a>
            <a href="/registro" class="nav-link">Registrar Alumno</a>
            <a href="/libros" class="nav-link">Gestión de Libros</a>
        </nav>
    </header>

    <main class="dashboard-main">
        <h2> Dashboard</h2>
        <div class="metrics-grid" id="metrics-grid">
            <div class="metric-card"><div class="metric-icon">🔍</div><div class="metric-info"><h3 id="m-consultas">-</h3><p>Consultas</p></div></div>
            <div class="metric-card"><div class="metric-icon">📚</div><div class="metric-info"><h3 id="m-libros">-</h3><p>Total Libros</p></div></div>
            <div class="metric-card"><div class="metric-icon">✅</div><div class="metric-info"><h3 id="m-disp">-</h3><p>Disponibles</p></div></div>
            <div class="metric-card"><div class="metric-icon">👥</div><div class="metric-info"><h3 id="m-alumnos">-</h3><p>Alumnos</p></div></div>
            <div class="metric-card"><div class="metric-icon">⏳</div><div class="metric-info"><h3 id="m-pend">-</h3><p>Pendientes</p></div></div>
        </div>

        <div class="dashboard-table-section">
            <h2>📋 Consultas Recientes</h2>
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>Consulta</th><th>Resultados</th><th>Fecha</th></tr></thead>
                    <tbody id="tbody-consultas"></tbody>
                </table>
            </div>
        </div>

        <div class="dashboard-table-section">
            <h2>📝 Reservas</h2>
            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>Alumno</th><th>Libro</th><th>Fecha</th><th>Estado</th><th>Acción</th></tr></thead>
                    <tbody id="tbody-reservas"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        async function loadDashboard() {
            try {
                // Métricas
                const mRes = await fetch('/api/metricas');
                const m = await mRes.json();
                document.getElementById('m-consultas').textContent = m.total_consultas;
                document.getElementById('m-libros').textContent = m.total_libros;
                document.getElementById('m-disp').textContent = m.disponibles;
                document.getElementById('m-alumnos').textContent = m.total_alumnos;
                document.getElementById('m-pend').textContent = m.reservas_pendientes;

                // Consultas recientes
                const tbodyC = document.getElementById('tbody-consultas');
                tbodyC.innerHTML = m.consultas_recientes.map(c => `
                    <tr><td>${c.consulta}</td><td>${c.resultados}</td><td>${c.timestamp.split('T')[0]}</td></tr>
                `).join('');

                // Reservas
                const rRes = await fetch('/api/reservas');
                const reservas = await rRes.json();
                const tbodyR = document.getElementById('tbody-reservas');
                
                if (reservas.length === 0) {
                    tbodyR.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">No hay reservas registradas.</td></tr>';
                } else {
                    tbodyR.innerHTML = reservas.map(r => {
                        let badgeClass = r.estado === 'pendiente' ? 'pendiente' : (r.estado === 'prestado' ? 'prestado' : 'devuelto');
                        let btnAction = '';
                        if (r.estado === 'pendiente') {
                            btnAction = `<button class="btn-toggle" onclick="cambiarEstado(${r.id}, 'prestado')">✅ Marcar Prestado</button>`;
                        } else if (r.estado === 'prestado') {
                            btnAction = `<button class="btn-toggle" onclick="cambiarEstado(${r.id}, 'devuelto')">↩️ Marcar Devuelto</button>`;
                        }
                        return `
                            <tr>
                                <td>${r.usuario_nombre || r.nombre}</td>
                                <td>${r.libro_titulo || '-'}</td>
                                <td>${r.fecha_reserva.split('T')[0]}</td>
                                <td><span class="badge ${badgeClass}">${r.estado.charAt(0).toUpperCase() + r.estado.slice(1)}</span></td>
                                <td>${btnAction}</td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error("Error cargando dashboard: ", err);
            }
        }

        async function cambiarEstado(id, nuevoEstado) {
            await fetch(`/api/reservas/${id}/estado`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ estado: nuevoEstado })
            });
            loadDashboard();
        }

        loadDashboard();
    </script>
</body>
</html>
