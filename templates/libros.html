<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <h1>Biblioteca IA</h1>
            </div>
            <div class="user-menu" id="user-menu"></div>
        </div>
        <nav class="header-nav">
            <a href="/" class="nav-link">Inicio</a>
            <a href="/checkin" class="nav-link">Check-in</a>
            <a href="/dashboard" class="nav-link" id="nav-dashboard">Dashboard</a>
            <a href="/registro" class="nav-link" id="nav-registro">Registrar Alumno</a>
            <a href="/libros" class="nav-link active">Gestión de Libros</a>
        </nav>
    </header>

    <main class="admin-main">
        <h2>📚 Gestión de Libros</h2>
        <p style="color: #94a3b8; margin-bottom: 1.5rem;">Administrá el inventario, stock y disponibilidad.</p>

        <div class="admin-toolbar">
            <input type="text" id="admin-search" class="search-input" placeholder="Buscar...">
            <select id="admin-per-page">
                <option value="10">10 por página</option>
                <option value="25">25 por página</option>
                <option value="50">50 por página</option>
            </select>
        </div>

        <div class="table-container">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Editorial</th>
                            <th>Ejemplares</th>
                            <th>Ubicación</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="admin-tbody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/libros.js') }}"></script>
</body>
</html>
