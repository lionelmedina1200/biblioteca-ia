<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Libros - Biblioteca IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <h1>Biblioteca IA</h1>
            </div>
            <div class="user-menu" id="user-menu"></div>
        </div>
        <nav class="header-nav">
            <a href="/" class="nav-link">Inicio</a>
            <a href="/checkin" class="nav-link">Check-in</a>
            <a href="/mis-libros" class="nav-link active">Mis Libros</a>
            <a href="/dashboard" class="nav-link" id="nav-dashboard" style="display:none;">Dashboard</a>
            <a href="/registro" class="nav-link" id="nav-registro" style="display:none;">Registrar Alumno</a>
            <a href="/libros" class="nav-link" id="nav-libros" style="display:none;">Gestión Libros</a>
            <a href="/logs" class="nav-link" id="nav-logs" style="display:none;">Logs Admin</a>
        </nav>
    </header>

    <main class="dashboard-main">
        <h2>📚 Catálogo de Libros</h2>
        <p style="color: #94a3b8; margin-bottom: 1.5rem;">Explorá todos los libros disponibles en nuestra biblioteca.</p>

        <div class="admin-toolbar">
            <input type="text" id="user-search" class="search-input" placeholder="Buscar por título, autor o categoría...">
            <select id="user-per-page">
                <option value="10">10 por página</option>
                <option value="25">25 por página</option>
                <option value="50">50 por página</option>
            </select>
        </div>

        <div class="table-container">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Categoría</th>
                            <th>Editorial</th>
                            <th>Stock</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="user-tbody"></tbody>
                </table>
            </div>
            <div class="pagination" id="user-pagination"></div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        let currentPage = 1;
        let perPage = 10;
        
        async function loadLibros(page = 1) {
            currentPage = page;
            const busqueda = document.getElementById('user-search')?.value || '';
            try {
                const res = await fetch(`/api/libros?page=${page}&per_page=${perPage}&busqueda=${encodeURIComponent(busqueda)}`);
                const data = await res.json();
                const tbody = document.getElementById('user-tbody');
                
                tbody.innerHTML = data.libros.map(l => `
                    <tr>
                        <td>${l.id}</td>
                        <td><strong>${l.titulo}</strong></td>
                        <td>${l.autor}</td>
                        <td>${l.categoria}</td>
                        <td>${l.editorial || '-'}</td>
                        <td><span class="badge stock">${l.cantidad || 1} ej.</span></td>
                        <td><span class="badge ${l.disponible ? 'disponible' : 'no-disponible'}">${l.disponible ? 'Disponible' : 'Agotado'}</span></td>
                    </tr>
                `).join('');
                
                renderPagination(data.total_pages, page);
            } catch (err) {
                console.error("Error cargando libros: ", err);
            }
        }

        function renderPagination(totalPages, current) {
            const container = document.getElementById('user-pagination');
            if (!container) return;
            let html = `<button class="page-btn" onclick="loadLibros(${current - 1})" ${current === 1 ? 'disabled' : ''}>◀ Ant</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= current - 1 && i <= current + 1)) {
                    html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="loadLibros(${i})">${i}</button>`;
                } else if (i === current - 2 || i === current + 2) {
                    html += `<span style="padding:8px">...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="loadLibros(${current + 1})" ${current === totalPages ? 'disabled' : ''}>Sig ▶</button>`;
            container.innerHTML = html;
        }

        if (document.getElementById('user-search')) document.getElementById('user-search').addEventListener('input', () => loadLibros(1));
        if (document.getElementById('user-per-page')) document.getElementById('user-per-page').addEventListener('change', (e) => { perPage = parseInt(e.target.value); loadLibros(1); });
        if (document.getElementById('user-tbody')) loadLibros(1);
    </script>
</body>
</html>
